# fly.toml app configuration file generated for smartvest on 2026-06-19T08:20:17Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smartvest'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'
  API_PORT = '3001'
  PORT = '3001'
  # Fix #1 (12/05/2026) — Active le gate session-aware dans top-gainers-scanner
  # ligne 1059 (PR #298 + test scanner-session-aware.spec.ts). Sans ce flag,
  # le scanner appelait les 9 EODHD screener à chaque cycle hors-RTH et écrivait
  # des doublons figés (148 HRB, 87 ATEC, etc.) dans gainers_user_shadow_signals.
  # Voir MEASURE-short-shadow-2026-05-11.md §16.8 pour l'investigation complète.
  SCANNER_SESSION_AWARE = 'true'

  # Micro-momentum (expérience shadow d'entrée HF crypto, table micro_momentum_probes).
  # Seuils élargis volontairement pour collecter un SPECTRE de triggers (run 3,4,5…
  # × vélocité) — l'analyse bucketise ensuite par (run_length, vélocité) pour trouver
  # où l'espérance nette de frais bascule positive. Trop strict = on ne voit que les
  # extrêmes, impossible de comparer faible vs fort. Activation = MICRO_MOMENTUM_ENABLED.
  MICRO_MIN_RUN = '3'
  MICRO_MIN_VELOCITY_PCT_S = '0.0001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
  processes = ['app']
  size = 'shared-cpu-2x'

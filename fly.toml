# fly.toml — SmartVest API (NestJS)
#
# Last forced redeploy : 2026-05-27 — re-trigger Fly workflow after b4f6667
# (dead-zone gate) hung on initial push 15:37 UTC. fly.toml is in trigger paths
# so a no-op edit re-enqueues the deploy job. Previous note 2026-05-02 #197.
# pre-hotfix build; #197 only touched supabase/migrations/* which doesn't
# match fly.yml `paths` filter, so no auto-deploy was triggered. This bump
# forces fly.yml to re-deploy from main HEAD (post-#196 BLOC 4 + #197 fix).
#
# auto_stop_machines = 'off' : la machine reste TOUJOURS up.
# Indispensable pour que les crons Lisa tournent sans interruption :
#   - autopilot (1 min)
#   - fast-risk-monitor (1 min)
#   - price-warmer (30 s)
#   - WebSocket Binance (connexion persistante)
# Si Fly mettait la machine en veille, ces crons s'arrêtent et les
# positions ne sont plus surveillées.
#
# primary_region = 'cdg' (Paris) : Binance.com bloque les IPs US (HTTP 451
# "Service unavailable from a restricted location"). Le WebSocket public
# stream.binance.com a la même restriction. Une région EU est obligatoire
# pour que la connexion Binance fonctionne — `iad` (Washington DC) ne
# convient pas.

app = 'smartvest'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'
  API_PORT = '3001'
  PORT = '3001'
  # Fix #1 (12/05/2026) — Active le gate session-aware dans top-gainers-scanner
  # ligne 1059 (PR #298 + test scanner-session-aware.spec.ts). Sans ce flag,
  # le scanner appelait les 9 EODHD screener à chaque cycle hors-RTH et écrivait
  # des doublons figés (148 HRB, 87 ATEC, etc.) dans gainers_user_shadow_signals.
  # Voir MEASURE-short-shadow-2026-05-11.md §16.8 pour l'investigation complète.
  SCANNER_SESSION_AWARE = 'true'

  # Micro-momentum (expérience shadow d'entrée HF crypto, table micro_momentum_probes).
  # Seuils élargis volontairement pour collecter un SPECTRE de triggers (run 3,4,5…
  # × vélocité) — l'analyse bucketise ensuite par (run_length, vélocité) pour trouver
  # où l'espérance nette de frais bascule positive. Trop strict = on ne voit que les
  # extrêmes, impossible de comparer faible vs fort. Activation = MICRO_MOMENTUM_ENABLED.
  MICRO_MIN_RUN = '3'
  MICRO_MIN_VELOCITY_PCT_S = '0.0001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

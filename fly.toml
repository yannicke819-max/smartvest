# fly.toml — SmartVest API (NestJS)
#
# auto_stop_machines = 'off' : la machine reste TOUJOURS up.
# Indispensable pour que les crons Lisa tournent sans interruption :
#   - autopilot (1 min)
#   - fast-risk-monitor (1 min)
#   - price-warmer (30 s)
#   - WebSocket Binance (connexion persistante)
# Si Fly mettait la machine en veille, ces crons s'arrêtent et les
# positions ne sont plus surveillées.

app = 'smartvest'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'
  API_PORT = '3001'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

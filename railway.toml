# Railway configuration for the SmartVest monorepo.
# Pins the builder + Dockerfile path so Railway doesn't fall back to
# Railpack/Nixpacks auto-detection, which can't resolve npm workspaces
# (it tries to `npm install @smartvest/domain` from the public registry
# instead of using the local workspace symlink).
#
# This file applies when the service's "Root Directory" in Railway is set
# to the repo root (empty / "/"). If Root Directory is apps/api, the build
# context shrinks to apps/api and the Dockerfile's `COPY packages/ packages/`
# cannot resolve — keep Root Directory at repo root for this service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# CMD in the Dockerfile is `node dist/main.js`. Leaving startCommand empty
# lets Docker honor the CMD verbatim — avoids a second layer of ambiguity.
# Pre-deploy runs apply-migrations.mjs via absolute path because the
# container WORKDIR is /app/apps/api — npm -w wouldn't find the workspace root.
preDeployCommand = "node /app/scripts/apply-migrations.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

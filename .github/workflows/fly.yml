name: Deploy SmartVest API to Fly.io

on:
  push:
    branches:
      - main
      - principal
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'fly.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/fly.yml'
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        # P18h — Inject GIT_SHA + BUILD_TIME at build time so /version can
        # report which commit/binary is actually running in prod.
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          flyctl deploy --remote-only \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$BUILD_TIME \
            --wait-timeout 300 --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
